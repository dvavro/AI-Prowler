[pytest]
# =====================================================================
# AI-Prowler pytest configuration
# =====================================================================
#
# EXCLUDED FROM DEFAULT RUN (require real Cloudflare API / live infra):
#
#   e2e         — full end-to-end tests that MINT REAL LICENSES and
#                 CREATE REAL CLOUDFLARE TUNNELS. Running these pollutes
#                 the Cloudflare tunnel list and the KV license store.
#                 Run explicitly only when testing the provisioning flow:
#                   python -m pytest tests/test_tunnel_ingress_e2e.py -m e2e -v
#                   python -m pytest tests/e2e/ -m e2e -v
#
#   live_worker — tests that hit the LIVE production Worker API at
#                 https://api.ai-prowler.com (read-only but requires
#                 internet + admin token). Run explicitly:
#                   python -m pytest tests/subscription/test_worker_api.py -v
#
# ALL OTHER TESTS run by default (unit, mcp, gui, subscription mocks,
# messaging, analysis, scheduler, installer). No live infra touched.
# =====================================================================

addopts = -m "not e2e and not live_worker" --tb=short -q

markers =
    e2e: end-to-end tests that mint real licenses and create real Cloudflare tunnels (deselected by default)
    live_worker: tests that hit the live production Cloudflare Worker API (deselected by default)
    slow: tests that are slow (embedding model, file IO, subprocess) — included by default, skip with -m "not slow"

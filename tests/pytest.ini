[pytest]
# AI-Prowler 6.0.0 functional test suite configuration

testpaths = tests
python_files = test_*.py
python_classes = Test
python_functions = test_*

# Show short-format summary for failures, errors, xfails, xpasses
# Verbose mode lists every test name — useful for tracking progress against
# the test plan.
addopts =
    -ra
    -v
    --tb=short
    --strict-markers
    --color=yes

markers =
    slow: tests that load the embedding model or do real chunking (>5 s each)
    ocr: tests requiring Tesseract on PATH
    regression: 10-minute pre-release smoke test (Section 8 of test plan)
    release_gate: fast checks that verify packaging and installer correctness
    e2e: end-to-end tests that spawn a real server subprocess over HTTP (requires mcp[cli])
    live_worker: tests that hit the live subscription worker at david-vavro1.workers.dev (skipped if offline)

# When an xfail test starts passing, fail the suite. This is what makes the
# bug-tracking workflow work: fixer removes the @xfail marker as part of the
# fix PR, and CI catches them if they forget.
xfail_strict = true

# Treat tests that can't find rag_preprocessor as an early hard failure
# rather than collecting a thousand nonsense errors.
required_plugins =
